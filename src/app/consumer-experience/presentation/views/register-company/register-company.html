<section>
  <h1 class="page-title">{{ 'register-company.title' | translate }}</h1>
  <p class="page-sub">{{ 'register-company.sub' | translate }}</p>

  <div class="ot-card" style="max-width:520px;">
    <div style="text-align:center;padding:8px 0 16px;">
      <i class="ti ti-building" style="font-size:48px;color:#C8B06E;margin-bottom:12px;display:block;"></i>
      <h3 style="font-size:16px;font-weight:600;margin:0 0 12px;">{{ 'register-company.card-title' | translate }}</h3>
      <p style="font-size:13px;color:#666;line-height:1.6;margin:0 0 24px;">{{ 'register-company.card-desc' | translate }}</p>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <button class="ot-btn" style="justify-content:center;width:100%;padding:12px;" (click)="goToOnboarding('MINING')">
          {{ 'register-company.btn-mining' | translate }}
        </button>
        <button class="ot-btn" style="justify-content:center;width:100%;padding:12px;" (click)="goToOnboarding('JEWELRY')">
          <i class="ti ti-heart" style="color:#C8B06E;"></i>
          {{ 'register-company.btn-jewelry' | translate }}
        </button>
      </div>
    </div>
  </div>
</section>
