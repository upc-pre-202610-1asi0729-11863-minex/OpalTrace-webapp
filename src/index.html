<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>OpalTrace</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function(l) {
      if (l.search[1] === 'p') {
        var parts = l.search.slice(1).split('&');
        var path  = parts[0].replace(/^p=/, '').replace(/~and~/g, '&');
        var query = parts.slice(1).map(function(s) {
          return s.replace(/^q=/, '').replace(/~and~/g, '&');
        }).filter(Boolean).join('&');
        window.history.replaceState(null, null,
          l.pathname.replace(/\/$/, '') + path + (query ? '?' + query : '') + l.hash
        );
      }
    }(window.location));
  </script>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Gluten:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
